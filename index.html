<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Trading Journal</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#0d1117; color:#e6edf3; padding:15px;}
.card { background:#161b22; padding:15px; border-radius:10px; margin-bottom:15px;}
input, select {
  width:100%; padding:10px; margin:5px 0;
  border-radius:6px; border:1px solid #30363d;
  background:#0d1117; color:white;
}
button {
  padding:10px; border:none; border-radius:6px;
  margin-top:5px; cursor:pointer;
}
.add { background:#238636; color:white; width:100%;}
.del { background:#da3633; color:white;}
.edit { background:#8957e5; color:white;}
table { width:100%; font-size:12px; border-collapse:collapse;}
th, td { border:1px solid #30363d; padding:6px; text-align:center;}
th { background:#21262d;}
</style>
</head>

<body>

<h2>Pro Trading Journal</h2>

<div class="card">
<h3>Add Trade</h3>
<input type="date" id="date">
<input type="text" id="pair" placeholder="Pair">

<select id="type">
<option>Buy</option>
<option>Sell</option>
</select>

<input type="number" id="entry" placeholder="Entry">
<input type="number" id="sl" placeholder="Stop Loss">
<input type="number" id="tp" placeholder="Take Profit">
<input type="number" id="risk" placeholder="Risk %">

<select id="outcome">
<option>Win</option>
<option>Loss</option>
</select>

<button class="add" onclick="addTrade()">Add Trade</button>
</div>

<div class="card">
<h3>Dashboard</h3>
<p>Total Trades: <span id="totalTrades">0</span></p>
<p>Win Rate: <span id="winRate">0%</span></p>
<p>Balance: $<span id="balance">2.00</span></p>
<p>Max Drawdown: <span id="drawdown">0%</span></p>
<p>Challenge Progress: <span id="challenge">0%</span></p>
</div>

<div class="card">
<canvas id="equityChart"></canvas>
</div>

<div class="card">
<h3>Trades</h3>
<table>
<thead>
<tr>
<th>Pair</th><th>RR</th><th>%</th><th>Balance</th><th>Actions</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<script>
let trades = JSON.parse(localStorage.getItem("trades")) || [];
let startBalance = 2;
let chart;

function calcRR(t){
  return t.type==="Buy" ? (t.tp-t.entry)/(t.entry-t.sl) : (t.entry-t.tp)/(t.sl-t.entry);
}

function calcGain(t, rr){
  return t.outcome==="Win" ? t.risk*rr : -t.risk;
}

function render(){
  let body = document.getElementById("tableBody");
  body.innerHTML="";

  let balance = startBalance;
  let peak = startBalance;
  let maxDD = 0;
  let wins = 0;
  let equity = [];

  trades.forEach((t,i)=>{
    let rr = calcRR(t);
    let gain = calcGain(t, rr);
    balance *= (1 + gain/100);

    if(balance>peak) peak=balance;
    let dd = ((peak-balance)/peak)*100;
    if(dd>maxDD) maxDD=dd;

    if(t.outcome==="Win") wins++;

    equity.push(balance);

    body.innerHTML += `
    <tr>
      <td>${t.pair}</td>
      <td>${rr.toFixed(2)}</td>
      <td>${gain.toFixed(2)}%</td>
      <td>${balance.toFixed(2)}</td>
      <td>
        <button class="edit" onclick="editTrade(${i})">Edit</button>
        <button class="del" onclick="deleteTrade(${i})">X</button>
      </td>
    </tr>`;
  });

  document.getElementById("totalTrades").innerText = trades.length;
  document.getElementById("winRate").innerText =
    trades.length ? ((wins/trades.length)*100).toFixed(1)+"%" : "0%";
  document.getElementById("balance").innerText = balance.toFixed(2);
  document.getElementById("drawdown").innerText = maxDD.toFixed(2)+"%";

  let progress = (balance/50)*100;
  document.getElementById("challenge").innerText = progress.toFixed(1)+"%";

  renderChart(equity);
}

function renderChart(data){
  let ctx = document.getElementById("equityChart").getContext("2d");
  if(chart) chart.destroy();

  chart = new Chart(ctx,{
    type:"line",
    data:{
      labels:data.map((_,i)=>i+1),
      datasets:[{
        label:"Equity Curve",
        data:data,
        borderWidth:2
      }]
    },
    options:{
      responsive:true,
      plugins:{legend:{labels:{color:"white"}}},
      scales:{
        x:{ticks:{color:"white"}},
        y:{ticks:{color:"white"}}
      }
    }
  });
}

function addTrade(){
  let t={
    date:date.value,
    pair:pair.value,
    type:type.value,
    entry:+entry.value,
    sl:+sl.value,
    tp:+tp.value,
    risk:+risk.value,
    outcome:outcome.value
  };

  if(!t.entry||!t.sl||!t.tp||!t.risk){
    alert("Fill all fields"); return;
  }

  trades.push(t);
  save();
}

function deleteTrade(i){
  trades.splice(i,1);
  save();
}

function editTrade(i){
  let t=trades[i];
  date.value=t.date;
  pair.value=t.pair;
  type.value=t.type;
  entry.value=t.entry;
  sl.value=t.sl;
  tp.value=t.tp;
  risk.value=t.risk;
  outcome.value=t.outcome;

  trades.splice(i,1);
  save();
}

function save(){
  localStorage.setItem("trades", JSON.stringify(trades));
  render();
}

render();
</script>

</body>
</html>
